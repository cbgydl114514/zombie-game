function resizeCanvas(){
  var w=document.getElementById("W");
  var vw=window.innerWidth,vh=window.innerHeight;
  var s=Math.min(vw/900,vh/600);
  w.style.width=Math.round(900*s)+"px";
  w.style.height=Math.round(600*s)+"px";
  if(window.innerWidth<500){
    document.body.style.backgroundColor="#000";
  }
}
window.addEventListener("resize",function(){setTimeout(resizeCanvas,50)});
window.addEventListener("orientationchange",function(){setTimeout(resizeCanvas,300)});
